<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐌𝐈𝐓𝐇𝐔𝐍 ➤𝐕𝐈𝐏 𝐒𝐈𝐆𝐍𝐀𝐋 Step Maker</title>
    <style>
        :root {
            --bg-color: #020205;
            --card-bg: #0b0e1a;
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --neon-green: #39ff14;
            --btn-grad: linear-gradient(45deg, #00f2ff, #ff00ea);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #161b33 0%, #020205 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* ঝলমলে এনিমেটেড বর্ডার কন্টেইনার */
        .container {
            position: relative;
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 25px;
            text-align: center;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.15);
        }

        /* বর্ডারে ঘুরন্ত আলোর ইফেক্ট */
        .container::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                var(--neon-blue), 
                var(--neon-pink), 
                var(--neon-blue), 
                transparent 40%
            );
            animation: rotateLight 4s linear infinite;
            z-index: 1;
        }

        .container::after {
            content: "";
            position: absolute;
            inset: 4px;
            background: var(--card-bg);
            border-radius: 22px;
            z-index: 2;
        }

        .content-box {
            position: relative;
            z-index: 3; /* সব লেখা বর্ডারের উপরে রাখার জন্য */
        }

        @keyframes rotateLight {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            letter-spacing: 1px;
        }

        .owner {
            color: var(--neon-green);
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 0 0 8px var(--neon-green);
            text-transform: uppercase;
        }

        .main-title {
            font-size: 22px;
            margin-bottom: 25px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 5px #ff00ea;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            color: var(--neon-blue);
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            background: rgba(255, 255, 255, 0.1);
        }

        .calculate-btn {
            width: 100%;
            padding: 16px;
            background: var(--btn-grad);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 0 20px rgba(255, 0, 234, 0.4);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .calculate-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
        }

        .result-section {
            margin-top: 30px;
            text-align: left;
        }

        .result-title {
            font-size: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .step-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--neon-blue);
        }

        .step-name { color: #ccc; font-weight: 500; }
        .step-value { color: var(--neon-green); font-weight: 800; text-shadow: 0 0 5px var(--neon-green); }

    </style>
</head>
<body>

<div class="container">
    <div class="content-box">
        <h1>𝐌𝐈𝐓𝐇𝐔𝐍 ➤𝐕𝐈𝐏 𝐒𝐈𝐆𝐍𝐀𝐋</h1>
        <div class="owner">owner of MITHUN.</div>
        
        <div class="main-title">স্টেপ মেকার ক্যালকুলেটর</div>

        <div class="input-group">
            <label>মোট টাকা (৳)</label>
            <input type="number" id="totalAmount" value="300">
        </div>

        <div class="input-group">
            <label>স্টেপ সংখ্যা</label>
            <input type="number" id="stepCount" value="5">
        </div>

        <button class="calculate-btn" onclick="generateSteps()">স্টেপ তৈরি করুন</button>

        <div class="result-section" id="resultSection" style="display: none;">
            <div class="result-title">ফলাফল</div>
            <div id="stepsList"></div>
        </div>
    </div>
</div>

<script>
    function generateSteps() {
        const totalAmount = parseFloat(document.getElementById('totalAmount').value);
        const steps = parseInt(document.getElementById('stepCount').value);
        const stepsList = document.getElementById('stepsList');
        const resultSection = document.getElementById('resultSection');

        if (isNaN(totalAmount) || isNaN(steps) || steps <= 0) {
            alert("দয়া করে সঠিক সংখ্যা দিন।");
            return;
        }

        stepsList.innerHTML = '';
        resultSection.style.display = 'block';

        let firstStep = totalAmount / (Math.pow(2, steps) - 1);

        for (let i = 1; i <= steps; i++) {
            let stepVal = firstStep * Math.pow(2, i - 1);
            
            const div = document.createElement('div');
            div.className = 'step-item';
            div.innerHTML = `
                <span class="step-name">স্টেপ ${i}</span>
                <span class="step-value">${stepVal.toFixed(2)} ৳</span>
            `;
            stepsList.appendChild(div);
        }
    }
</script>

</body>
</html>
